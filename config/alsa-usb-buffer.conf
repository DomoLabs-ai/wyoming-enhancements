# ALSA buffer configuration for USB audio devices
# Prevents crackling on Raspberry Pi 4 and similar SBCs
# Copy to /etc/asound.conf or ~/.asoundrc

defaults.pcm.dmix.rate 48000
defaults.pcm.dmix.format S16_LE

pcm.usb_audio {
  type plug
  slave {
    pcm {
      type dmix
      ipc_key 1024
      slave {
        pcm "hw:1,0"
        rate 48000
        format S16_LE
        period_size 1024
        buffer_size 8192
      }
    }
  }
}
