name: ShellCheck
on:
  push:
    branches: [main]
    paths: ["**.sh"]
  pull_request:
    branches: [main]
    paths: ["**.sh"]
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ludeeus/action-shellcheck@master
        with:
          severity: warning
